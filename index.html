<!DOCTYPE HTML>
<html>
	<head>
		<meta content="text/html;charset=utf-8" http-equiv="Content-Type">
		<meta content="utf-8" http-equiv="encoding">

		<title></title>
		<meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
		<link href="./style.css" rel="stylesheet">
		<script type="module" src="./index.js"></script>
		<style>
			body {
				display: flex;
				flex-direction: column;
			}
			.dd-body {
				display: flex;
				flex-direction: row;
				height: 100%;
				flex: 1;
			}
			.col-result {
				white-space: pre;
				flex: 2;
			}
			.col-setting {
				flex: 1;
			}
		</style>
	</head>
	<body>
		<nav class="dd-header">
			<div class="icd-header-item">
				Vygenerovaný kód je třeba vložit do souboru <code>include/cards.tex</code> v <a href="https://github.com/izar-cz/troll_hunters">LaTeXové šabloně</a>.
			</div>
		</nav>
		<div class="dd-body">
			<textarea id='latex' class="col-result">
			</textarea>
			<div class="col-setting">
				<ul></ul>
				<button data-tool="submit">Generate</button>
				<button data-tool="selectAll">all</button>
				<button data-tool="selectNone">none</button>
				
				<ul>
					<li><a href="/?lang=cs">cesky</a></li>
					<li><a href="/?lang=en">english</a></li>
				</ul>
			</div>
		</div>
	</body>
</html>
